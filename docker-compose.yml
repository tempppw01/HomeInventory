services:
  home-inventory:
    image: ${HOME_INVENTORY_IMAGE:-home-inventory:local}
    build:
      context: .
    container_name: home-inventory
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: file:/app/data/home-inventory.db
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-auto}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    volumes:
      - home_inventory_data:/app/data

volumes:
  home_inventory_data:
